---
name: Feature Request
description: Suggest an idea for brain CLI
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: "It's frustrating when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should the feature look like?
      placeholder: "A new command `brain xyz` that..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any workarounds you've tried
  - type: checkboxes
    id: terms
    attributes:
      label: Confidentiality
      options:
        - label: I confirm this report contains no secrets or credentials
          required: true
